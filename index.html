        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ width: 52, height: 52, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name="user" size={24} color="white" />
          </div>
          <div>
            <p style={{ fontWeight: 700, fontSize: 16 }}>{settings.name || 'Your Name'}</p>
            <p style={{ fontSize: 13, opacity: 0.8, marginTop: 2 }}>{settings.company || 'Company / School'}</p>
          </div>
        </div>
      </div>

      <div style={{ padding: '0 20px' }}>
        {/* Profile fields */}
        <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', border: '1px solid var(--border)', marginBottom: 14 }}>
          <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>Profile</p>
          <Field label="Your Name">
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Juan Dela Cruz" style={inputStyle} />
          </Field>
          <Field label="Company / School" style={{ marginBottom: 0 }}>
            <input value={company} onChange={(e) => setCompany(e.target.value)} placeholder="e.g. Acme Corp" style={inputStyle} />
          </Field>
        </div>

        {/* OJT settings */}
        <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', border: '1px solid var(--border)', marginBottom: 14 }}>
          <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>OJT Hours</p>
          <Field label="Required Hours" style={{ marginBottom: 0 }}>
            <input type="number" value={reqHrs} onChange={(e) => setReqHrs(e.target.value)} min={1} max={9999} placeholder="486" style={inputStyle} />
          </Field>
          <p style={{ fontSize: 12, color: 'var(--text3)', marginTop: 6 }}>Default: 486 hours (typical for Philippine OJT programs)</p>
          <div style={{ marginTop: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 14px', background: 'var(--bg)', borderRadius: 10, border: '1.5px solid var(--border)' }}>
            <div>
              <p style={{ fontSize: 14, fontWeight: 600 }}>Paid Lunch Break</p>
              <p style={{ fontSize: 12, color: 'var(--text2)', marginTop: 2 }}>
                {settings.paidLunch ? 'Lunch hour is counted as work time' : '1 hour deducted on days with 5+ hrs logged'}
              </p>
            </div>
            <button onClick={() => updateSettings({ paidLunch: !settings.paidLunch })}
              style={{ position: 'relative', width: 46, height: 26, borderRadius: 13, flexShrink: 0,
                background: settings.paidLunch ? 'var(--accent)' : 'var(--border)', transition: 'background 0.2s' }}>
              <span style={{ position: 'absolute', top: 3, left: settings.paidLunch ? 23 : 3, width: 20, height: 20, borderRadius: '50%', background: 'white',
                boxShadow: '0 1px 4px rgba(0,0,0,0.2)', transition: 'left 0.2s' }} />
            </button>
          </div>
        </div>

        {/* Smart Reminders */}
        <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', border: '1px solid var(--border)', marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <Icon name="bell" size={16} color="var(--accent)" />
            <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Smart Reminders</p>
          </div>
          {[
            { key: 'idleAlert', label: 'Idle Detection', sub: 'Alert when session is running but you\'re inactive', child: settings.idleAlert && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8 }}>
                <span style={{ fontSize: 13, color: 'var(--text2)' }}>Idle threshold:</span>
                <input type="number" min={5} max={120} value={settings.idleMinutes || 30} onChange={e => updateSettings({ idleMinutes: parseInt(e.target.value) || 30 })} style={{ ...inputStyle, width: 70, padding: '6px 10px' }} />
                <span style={{ fontSize: 13, color: 'var(--text2)' }}>minutes</span>
              </div>
            )},
            { key: 'timeoutReminder', label: 'Time-Out Reminder', sub: 'Remind to end session after this time', child: settings.timeoutReminder && (
              <input type="time" value={settings.timeoutTime || '18:00'} onChange={e => updateSettings({ timeoutTime: e.target.value })} style={{ ...inputStyle, marginTop: 8, width: 140 }} />
            )},
            { key: 'logReminder', label: 'Daily Log Reminder', sub: 'Remind to log in if no session by this time', child: settings.logReminder && (
              <input type="time" value={settings.logReminderTime || '09:00'} onChange={e => updateSettings({ logReminderTime: e.target.value })} style={{ ...inputStyle, marginTop: 8, width: 140 }} />
            )},
          ].map(item => (
            <div key={item.key} style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', background: 'var(--bg)', borderRadius: 10, border: '1.5px solid var(--border)' }}>
                <div>
                  <p style={{ fontSize: 14, fontWeight: 600 }}>{item.label}</p>
                  <p style={{ fontSize: 12, color: 'var(--text2)', marginTop: 2 }}>{item.sub}</p>
                </div>
                <button onClick={() => updateSettings({ [item.key]: !settings[item.key] })}
                  style={{ position: 'relative', width: 46, height: 26, borderRadius: 13, flexShrink: 0,
                    background: settings[item.key] ? 'var(--accent)' : 'var(--border)', transition: 'background 0.2s' }}>
                  <span style={{ position: 'absolute', top: 3, left: settings[item.key] ? 23 : 3, width: 20, height: 20, borderRadius: '50%', background: 'white', boxShadow: '0 1px 4px rgba(0,0,0,0.2)', transition: 'left 0.2s' }} />
                </button>
              </div>
              {item.child}
            </div>
          ))}
        </div>

        {/* Appearance */}
        <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', border: '1px solid var(--border)', marginBottom: 14 }}>
          <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>Appearance</p>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, padding: '12px 14px', background: 'var(--bg)', borderRadius: 10, border: '1.5px solid var(--border)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name={settings.darkMode ? 'moon' : 'sun'} size={18} color="var(--accent)" />
              <div>
                <p style={{ fontSize: 14, fontWeight: 600 }}>Dark Mode</p>
                <p style={{ fontSize: 12, color: 'var(--text2)', marginTop: 2 }}>{settings.darkMode ? 'Dark theme active' : 'Light theme active'}</p>
              </div>
            </div>
            <button onClick={() => updateSettings({ darkMode: !settings.darkMode })}
              style={{ position: 'relative', width: 46, height: 26, borderRadius: 13, flexShrink: 0,
                background: settings.darkMode ? 'var(--accent)' : 'var(--border)', transition: 'background 0.2s' }}>
              <span style={{ position: 'absolute', top: 3, left: settings.darkMode ? 23 : 3, width: 20, height: 20, borderRadius: '50%', background: 'white', boxShadow: '0 1px 4px rgba(0,0,0,0.2)', transition: 'left 0.2s' }} />
            </button>
          </div>
          <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>Accent Color</p>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>
            {ACCENTS.map((c) =>
            <button key={c} onClick={() => updateSettings({ accentColor: c })}
            style={{ width: 36, height: 36, borderRadius: '50%', background: c, border: `3px solid ${settings.accentColor === c ? c : 'transparent'}`,
              outline: `2px solid ${settings.accentColor === c ? c : 'transparent'}`, outlineOffset: 2, transition: 'all 0.15s', flexShrink: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {settings.accentColor === c && <Icon name="check" size={16} color="white" />}
              </button>
            )}
            {/* Color wheel */}
            {(() => {
              const isCustom = !ACCENTS.includes(settings.accentColor);
              return (
                <label title="Custom color" style={{ position: 'relative', width: 36, height: 36, borderRadius: '50%', cursor: 'pointer', flexShrink: 0,
                  background: 'conic-gradient(red 0deg, yellow 60deg, lime 120deg, cyan 180deg, blue 240deg, magenta 300deg, red 360deg)',
                  border: `3px solid ${isCustom ? settings.accentColor : 'transparent'}`,
                  outline: `2px solid ${isCustom ? settings.accentColor : 'transparent'}`,
                  outlineOffset: 2, transition: 'all 0.15s', overflow: 'hidden',
                  display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <input type="color" value={settings.accentColor} onChange={e => updateSettings({ accentColor: e.target.value })}
                    style={{ position: 'absolute', inset: 0, opacity: 0, cursor: 'pointer', width: '100%', height: '100%', padding: 0, border: 'none' }} />
                  {isCustom
                    ? <div style={{ width: 14, height: 14, borderRadius: '50%', background: settings.accentColor, border: '2px solid white', pointerEvents: 'none', zIndex: 1 }} />
                    : <div style={{ width: 14, height: 14, borderRadius: '50%', background: 'rgba(255,255,255,0.85)', pointerEvents: 'none', zIndex: 1 }} />
                  }
                </label>
              );
            })()}
          </div>
        </div>

        {/* Save */}
        <button onClick={save} style={{ width: '100%', padding: 14, borderRadius: 10, marginBottom: 14,
          background: saved ? 'var(--emerald)' : 'var(--accent)', color: 'white', fontWeight: 700, fontSize: 15, transition: 'background 0.3s',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
          <Icon name={saved ? 'check' : 'settings'} size={17} color="white" />
          {saved ? 'Saved!' : 'Save Settings'}
        </button>

        {/* Danger zone */}
        <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', border: '1px solid var(--border)' }}>
          <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--rose)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>Danger Zone</p>
          <button onClick={() => setClearConfirm(true)}
          style={{ width: '100%', padding: 13, borderRadius: 10, background: 'var(--rose-light)', color: 'var(--rose)', fontWeight: 600, fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
            <Icon name="trash" size={17} color="var(--rose)" />
            Clear All Data
          </button>
          <p style={{ fontSize: 12, color: 'var(--text3)', marginTop: 8, textAlign: 'center' }}>This permanently deletes all records, activities, and photos.</p>
        </div>
      </div>

      {clearConfirm && <Confirm msg="Clear all data?" sub="All records, activities, and photos will be permanently deleted." onOk={clearAll} onCancel={() => setClearConfirm(false)} okLabel="Clear Everything" />}
    </div>);

}

// ─── Tweaks Panel ─────────────────────────────────────────────────────────────
function TweaksPanel({ onClose, records, setRecords, setActs, setImages, settings, updateSettings }) {
  const seed = () => {
    const base = new Date(),samples = [];
    for (let i = 20; i >= 1; i--) {
      const d = new Date(base);d.setDate(d.getDate() - i);
      if (d.getDay() === 0 || d.getDay() === 6) continue;
      const key = d.toISOString().slice(0, 10);
      const inT = new Date(d);inT.setHours(7 + Math.floor(Math.random() * 2), Math.floor(Math.random() * 30), 0);
      const outT = new Date(inT);outT.setHours(inT.getHours() + 8 + Math.floor(Math.random() * 2), Math.floor(Math.random() * 30), 0);
      samples.push({ date: key, id: Date.now() + i, manual: true, sessions: [{id: Date.now()+i+'_0', in: inT.toISOString(), out: outT.toISOString()}] });
    }
    setRecords((p) => {const ex = new Set(p.map((r) => r.date));return [...p, ...samples.filter((s) => !ex.has(s.date))];});
  };
  const clear = () => {setRecords([]);setActs({});setImages({});};
  return (
    <div style={{ position: 'fixed', bottom: 68, right: 14, zIndex: 400, background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', boxShadow: 'var(--shadow-lg)', border: '1px solid var(--border)', width: 232 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <p style={{ fontWeight: 700, fontSize: 14 }}>Tweaks</p>
        <button onClick={onClose} style={{ color: 'var(--text3)', fontSize: 18, lineHeight: 1 }}>×</button>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <button onClick={seed} style={{ padding: '9px 12px', borderRadius: 8, background: 'var(--accent-light)', color: 'var(--accent)', fontWeight: 600, fontSize: 13, textAlign: 'left' }}>+ Seed 14 days sample data</button>
        <button onClick={clear} style={{ padding: '9px 12px', borderRadius: 8, background: 'var(--rose-light)', color: 'var(--rose)', fontWeight: 600, fontSize: 13, textAlign: 'left' }}>🗑 Clear all data</button>
        <div style={{ borderTop: '1px solid var(--border)', paddingTop: 10 }}>
          <p style={{ fontSize: 11, color: 'var(--text3)', lineHeight: 1.5 }}>Change required hours &amp; accent color in <strong>Settings</strong>.</p>
        </div>
      </div>
    </div>);

}
