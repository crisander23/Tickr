<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TICKR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e8e6df;
  --text: #1c1917;
  --text2: #78716c;
  --text3: #b8b0a8;
  --accent: #3730a3;
  --accent-light: #eef2ff;
  --accent-mid: #c7d2fe;
  --emerald: #059669;
  --emerald-light: #d1fae5;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --rose: #e11d48;
  --rose-light: #ffe4e6;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
  --r: 16px;
}
[data-theme="dark"] {
  --bg: #111110;
  --surface: #1c1b19;
  --border: #2e2c29;
  --text: #f0ede8;
  --text2: #9c9289;
  --text3: #5c554e;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
  --shadow: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
}
html, body, #root { height: 100%; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; transition: background-color 0.25s, color 0.25s; }
button:active:not(:disabled) { opacity: 0.82; transform: scale(0.97); }
button { font-family:inherit; cursor:pointer; border:none; background:none; }
input, textarea, select { font-family:inherit; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
input[type="date"], input[type="time"] { appearance:none; -webkit-appearance:none; }
:root { color-scheme: light; }
[data-theme="dark"] { color-scheme: dark; }
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.slide-up { animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1); }
@keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:none; opacity:1; } }
.pop-in { animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from { transform:scale(0.92); opacity:0; } to { transform:scale(1); opacity:1; } }

/* ── Responsive layout ─────────────────────────────── */
.app-shell { display:flex; flex-direction:column; height:100%; }
.app-content { flex:1; overflow-y:auto; overflow-x:hidden; }
.page-inner { max-width:520px; margin:0 auto; }

@media (min-width: 768px) {
  .app-shell { flex-direction:row; }
  .app-content { flex:1; }
  .page-inner { max-width:760px; }
}
@media (min-width: 1100px) {
  .page-inner { max-width:980px; }
}

/* Desktop two-column page layouts */
.desktop-grid-2 { display:grid; grid-template-columns:1fr; gap:20px; }
@media (min-width: 768px) {
  .desktop-grid-2 { grid-template-columns:1fr 1fr; }
}
.desktop-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
@media (min-width: 768px) {
  .desktop-grid-3 { grid-template-columns:repeat(4,1fr); }
}

/* Sidebar */
.sidebar {
  display: none;
}
@media (min-width: 768px) {
  .sidebar {
    display: flex;
    flex-direction: column;
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    height: 100%;
    overflow-y: auto;
    position: sticky;
    top: 0;
  }
}
@media (min-width: 1100px) {
  .sidebar { width: 240px; min-width: 240px; }
}
.bottom-nav {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  flex-shrink: 0;
}
@media (min-width: 768px) {
  .bottom-nav { display: none; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Storage ────────────────────────────────────────────────────────────────
const LS = {
  get: (k, d) => {try {const v = localStorage.getItem(k);return v ? JSON.parse(v) : d;} catch {return d;}},
  set: (k, v) => {try {localStorage.setItem(k, JSON.stringify(v));} catch {}}
};

// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmt12 = (d) => {
  if (!d) return '—';
  const dt = new Date(d);
  let h = dt.getHours(),m = dt.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2, '0')} ${ap}`;
};
const fmtDate = (d) => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
const fmtShort = (d) => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
const fmtDay = (d) => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
const fmtDayShort = (d) => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' });
const todayKey = () => new Date().toISOString().slice(0, 10);
const msToHours = (ms) => ms / 3600000;

// ─── Session helpers (multi time-in/out per day) ──────────────────────────────
const getSessions = (r) => {
  if (r.sessions) return r.sessions;
  // backward compat: old records with timeIn/timeOut
  if (r.timeIn) return [{id: r.id, in: r.timeIn, out: r.timeOut||null}];
  return [];
};
const recHours = (r) => getSessions(r).reduce((sum, s) => {
  if (s.in && s.out) return sum + msToHours(new Date(s.out) - new Date(s.in));
  return sum;
}, 0);
const effectiveHours = (r, paidLunch = true) => {
  const raw = recHours(r);
  return (!paidLunch && raw >= 5) ? raw - 1 : raw;
};
const openSession = (r) => getSessions(r).find(s => s.in && !s.out);
const migrateRecord = (r) => {
  if (r.sessions) return r;
  return { date: r.date, id: r.id, manual: r.manual||false,
    sessions: r.timeIn ? [{id: r.id+'_0', in: r.timeIn, out: r.timeOut||null}] : [] };
};
const fmtH = (h) => {
  const w = Math.floor(h),m = Math.round((h - w) * 60);
  if (w === 0) return `${m}m`;
  return m > 0 ? `${w}h ${m}m` : `${w}h`;
};
const parseTimeToISO = (dateKey, timeStr) => {
  if (!timeStr) return null;
  return new Date(`${dateKey}T${timeStr}:00`).toISOString();
};
const isoToTimeInput = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
};

// ─── Icons ────────────────────────────────────────────────────────────────────
const PATHS = {
  home: <><rect x="3" y="3" width="7" height="7" rx="1.5" /><rect x="14" y="3" width="7" height="7" rx="1.5" /><rect x="3" y="14" width="7" height="7" rx="1.5" /><rect x="14" y="14" width="7" height="7" rx="1.5" /></>,
  logs: <><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /><line x1="9" y1="12" x2="15" y2="12" /><line x1="9" y1="16" x2="13" y2="16" /></>,
  activity: <><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" /></>,
  charts: <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></>,
  settings: <><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" /></>,
  clock: <><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></>,
  check: <polyline points="20 6 9 17 4 12" />,
  plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
  chevron: <polyline points="9 18 15 12 9 6" />,
  back: <polyline points="15 18 9 12 15 6" />,
  download: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></>,
  trash: <><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" /><path d="M10 11v6M14 11v6" /><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" /></>,
  user: <><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></>,
  image: <><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></>,
  camera: <><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" /><circle cx="12" cy="13" r="4" /></>,
  x: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
  edit: <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" /></>,
  csv: <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /></>,
  info: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></>,
  bell: <><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 01-3.46 0" /></>,
  copy: <><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></>,
  analytics: <><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></>,
  moon: <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />,
  sun: <><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></>
};
const Icon = ({ name, size = 20, color = 'currentColor', strokeWidth = 2 }) =>
<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    {PATHS[name]}
  </svg>;


// ─── Badge ────────────────────────────────────────────────────────────────────
const Badge = ({ status }) => {
  const M = {
    complete: { label: 'Complete', bg: 'var(--emerald-light)', c: 'var(--emerald)' },
    pending: { label: 'No Time Out', bg: 'var(--amber-light)', c: 'var(--amber)' },
    absent: { label: 'Absent', bg: 'var(--rose-light)', c: 'var(--rose)' },
    manual: { label: 'Manual Entry', bg: '#ede9fe', c: '#7c3aed' }
  };
  const s = M[status] || M.absent;
  return <span style={{ background: s.bg, color: s.c, fontSize: 11, fontWeight: 600, padding: '3px 9px', borderRadius: 99, whiteSpace: 'nowrap' }}>{s.label}</span>;
};

// ─── Progress Ring ────────────────────────────────────────────────────────────
const Ring = ({ pct, size = 80, stroke = 7, color = 'var(--accent)' }) => {
  const r = (size - stroke) / 2,c = 2 * Math.PI * r;
  const off = c - Math.min(pct, 100) / 100 * c;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="white" strokeWidth={stroke}
      strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
      style={{ transition: 'stroke-dashoffset 1s ease' }} />
    </svg>);

};

// ─── Input field component ────────────────────────────────────────────────────
const Field = ({ label, children, style }) =>
<div style={{ marginBottom: 14, ...style }}>
    <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text2)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{label}</label>
    {children}
  </div>;

const inputStyle = { width: '100%', padding: '11px 14px', borderRadius: 10, border: '1.5px solid var(--border)', fontSize: 14, color: 'var(--text)', background: 'var(--bg)', outline: 'none', transition: 'border-color 0.15s' };

// ─── Modal Wrapper ────────────────────────────────────────────────────────────
const Modal = ({ onClose, children, title }) =>
<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 500, backdropFilter: 'blur(2px)', padding: '20px' }} onClick={onClose}>
    <div className="pop-in" style={{ background: 'var(--surface)', borderRadius: 18, width: '100%', maxWidth: 480, maxHeight: '90vh', overflowY: 'auto', boxShadow: 'var(--shadow-lg)' }} onClick={(e) => e.stopPropagation()}>
      <div style={{ padding: '20px 20px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700 }}>{title}</h2>
        <button onClick={onClose} style={{ padding: 6, borderRadius: 8, background: 'var(--bg)' }}><Icon name="x" size={18} color="var(--text2)" /></button>
      </div>
      <div style={{ padding: '12px 20px 24px' }}>{children}</div>
    </div>
  </div>;


// ─── Confirm Dialog ───────────────────────────────────────────────────────────
const Confirm = ({ msg, sub, onOk, onCancel, okLabel = 'Delete', okColor = 'var(--rose)' }) =>
<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 600, backdropFilter: 'blur(2px)', padding: '20px' }} onClick={onCancel}>
    <div className="pop-in" style={{ background: 'var(--surface)', borderRadius: 18, padding: '28px 24px', width: '100%', maxWidth: 360, boxShadow: 'var(--shadow-lg)' }} onClick={(e) => e.stopPropagation()}>
      <p style={{ fontSize: 17, fontWeight: 700, textAlign: 'center' }}>{msg}</p>
      {sub && <p style={{ fontSize: 13, color: 'var(--text2)', textAlign: 'center', marginTop: 6 }}>{sub}</p>}
      <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
        <button onClick={onCancel} style={{ flex: 1, padding: 13, borderRadius: 10, background: 'var(--bg)', fontWeight: 600, fontSize: 14 }}>Cancel</button>
        <button onClick={onOk} style={{ flex: 1, padding: 13, borderRadius: 10, background: okColor, color: 'white', fontWeight: 600, fontSize: 14 }}>{okLabel}</button>
      </div>
    </div>
  </div>;


// ─── useDesktop hook ─────────────────────────────────────────────────────────
function useDesktop() {
  const [desk, setDesk] = useState(() => window.innerWidth >= 768);
  useEffect(() => {
    const h = () => setDesk(window.innerWidth >= 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return desk;
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(() => LS.get('ojt_screen', 'home'));
  const [records, setRecords] = useState(() => LS.get('ojt_records', []).map(migrateRecord));
  const [activities, setActs] = useState(() => LS.get('ojt_activities', {}));
  const [images, setImages] = useState(() => LS.get('ojt_images', {}));
  const [settings, setSettings] = useState(() => LS.get('ojt_settings', { name: '', company: '', requiredHours: 486, accentColor: '#3730a3', paidLunch: true, darkMode: false, idleAlert: true, idleMinutes: 30, timeoutReminder: true, timeoutTime: '18:00', logReminder: true, logReminderTime: '09:00' }));
  const [tweaks, setTweaks] = useState(false);
  const [idleAlert, setIdleAlert] = useState(false);
  const [timeoutAlert, setTimeoutAlert] = useState(false);
  const [logAlert, setLogAlert] = useState(false);
  const lastActivityRef = useRef(Date.now());
  const dismissedRef = useRef({ timeout: '', log: '' });

  useEffect(() => {document.documentElement.style.setProperty('--accent', settings.accentColor);}, [settings.accentColor]);

  useEffect(() => {
    const hex = settings.accentColor;
    if (!/^#[0-9a-f]{6}$/i.test(hex)) return;
    const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h = 0, s = 0;
    const l = (max+min)/2;
    if (max !== min) {
      const d = max-min;
      s = l > 0.5 ? d/(2-max-min) : d/(max+min);
      if (max===r) h=((g-b)/d+(g<b?6:0))/6;
      else if (max===g) h=((b-r)/d+2)/6;
      else h=((r-g)/d+4)/6;
    }
    const hd = Math.round(h*360), sp = Math.round(Math.min(s*100+15,100));
    const dark = settings.darkMode;
    document.documentElement.style.setProperty('--accent-light', `hsl(${hd},${sp}%,${dark ? '18%' : '95%'})`);
    document.documentElement.style.setProperty('--accent-mid', `hsl(${hd},${sp}%,${dark ? '32%' : '84%'})`);
  }, [settings.accentColor, settings.darkMode]);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', settings.darkMode ? 'dark' : '');
  }, [settings.darkMode]);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  useEffect(() => LS.set('ojt_screen', screen), [screen]);
  useEffect(() => LS.set('ojt_records', records), [records]);
  useEffect(() => LS.set('ojt_activities', activities), [activities]);
  useEffect(() => LS.set('ojt_images', images), [images]);
  useEffect(() => LS.set('ojt_settings', settings), [settings]);

  useEffect(() => {
    const update = () => { lastActivityRef.current = Date.now(); };
    ['mousemove', 'keydown', 'touchstart', 'click'].forEach(e => document.addEventListener(e, update, { passive: true }));
    return () => ['mousemove', 'keydown', 'touchstart', 'click'].forEach(e => document.removeEventListener(e, update));
  }, []);

  useEffect(() => {
    const check = () => {
      const now = new Date();
      const today = todayKey();
      const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const todayRec = records.find(r => r.date === today);
      const hasActive = todayRec && !!openSession(todayRec);
      if (settings.idleAlert && hasActive) {
        const idleMin = (Date.now() - lastActivityRef.current) / 60000;
        if (idleMin >= (settings.idleMinutes || 30)) setIdleAlert(true);
      }
      if (settings.timeoutReminder && hasActive && timeStr >= (settings.timeoutTime || '18:00') && dismissedRef.current.timeout !== today) setTimeoutAlert(true);
      if (settings.logReminder && dismissedRef.current.log !== today) {
        const noLog = !todayRec || getSessions(todayRec).length === 0;
        if (noLog && timeStr >= (settings.logReminderTime || '09:00')) setLogAlert(true);
      }
    };
    check();
    const id = setInterval(check, 60000);
    return () => clearInterval(id);
  }, [records, settings]);

  useEffect(() => {
    const h = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
      if (e.key === 'h') setScreen('home');
      else if (e.key === 'a') setScreen('logs');
      else if (e.key === 'r') setScreen('charts');
      else if (e.key === ',') setScreen('settings');
      else if (e.key === 't') { const tr = records.find(r => r.date === todayKey()); if (!tr || !openSession(tr)) timeIn(); }
      else if (e.key === 'o') { const tr = records.find(r => r.date === todayKey()); if (tr && openSession(tr)) timeOut(); }
    };
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [records, timeIn, timeOut]);

  const totalHours = useMemo(() => records.reduce((s, r) => s + effectiveHours(r, settings.paidLunch), 0), [records, settings.paidLunch]);
  const todayRec = useMemo(() => records.find((r) => r.date === todayKey()), [records]);

  const timeIn = useCallback(() => {
    const key = todayKey();
    const now = new Date().toISOString();
    setRecords(p => {
      const existing = p.find(r => r.date === key);
      if (existing) {
        // Only add new session if no open session exists
        if (openSession(existing)) return p;
        const newSession = {id: Date.now(), in: now, out: null};
        return p.map(r => r.date === key ? {...r, sessions: [...(r.sessions||[]), newSession]} : r);
      }
      return [...p, {date: key, id: Date.now(), manual: false, sessions: [{id: Date.now()+'_0', in: now, out: null}]}];
    });
  }, []);

  const timeOut = useCallback(() => {
    const key = todayKey();
    const now = new Date().toISOString();
    setRecords(p => p.map(r => {
      if (r.date !== key) return r;
      const sessions = getSessions(r).map(s => s.in && !s.out ? {...s, out: now} : s);
      return {...r, sessions};
    }));
  }, []);

  const addSession = useCallback((date, sessionIn, sessionOut) => {
    setRecords(p => p.map(r => {
      if (r.date !== date) return r;
      const newSession = {id: Date.now(), in: sessionIn, out: sessionOut||null};
      return {...r, sessions: [...getSessions(r), newSession]};
    }));
  }, []);

  const deleteSession = useCallback((date, sessionId) => {
    setRecords(p => p.map(r => {
      if (r.date !== date) return r;
      const sessions = getSessions(r).filter(s => s.id !== sessionId);
      return {...r, sessions};
    }));
  }, []);

  const addRecord = useCallback((rec) => {
    setRecords(p => {
      const existing = p.find(r => r.date === rec.date);
      if (existing) return p.map(r => r.date === rec.date ? {...r, sessions: rec.sessions||getSessions(r)} : r);
      return [...p, {date: rec.date, id: rec.id||Date.now(), manual: true, sessions: rec.sessions||[]}];
    });
  }, []);

  const deleteRecord = useCallback((id) => setRecords((p) => p.filter((r) => r.id !== id)), []);
  const editSession = useCallback((date, sessionId, newIn, newOut) => {
    setRecords(p => p.map(r => {
      if (r.date !== date) return r;
      return { ...r, sessions: getSessions(r).map(s => s.id === sessionId ? { ...s, in: newIn, out: newOut || null } : s) };
    }));
  }, []);
  const updateAct = useCallback((date, text) => setActs((p) => ({ ...p, [date]: text })), []);
  const addImage = useCallback((date, b64) => setImages((p) => ({ ...p, [date]: [...(p[date] || []), b64] })), []);
  const removeImage = useCallback((date, idx) => setImages((p) => ({ ...p, [date]: (p[date] || []).filter((_, i) => i !== idx) })), []);
  const updateSettings = useCallback((s) => setSettings((p) => ({ ...p, ...s })), []);

  const desktop = useDesktop();
  const PAGES = { home: Home, logs: Logs, charts: Charts, settings: Settings };
  const Page = PAGES[screen] || Home;
  const sharedProps = { screen, setScreen, records, totalHours, todayRec, timeIn, timeOut, addRecord, deleteRecord, addSession, deleteSession, editSession, activities, updateAct, images, addImage, removeImage, settings, updateSettings, desktop };

  return (
    <div className="app-shell">
      <SideNav screen={screen} setScreen={setScreen} settings={settings} totalHours={totalHours} updateSettings={updateSettings} />
      <div className="app-content">
        <div className="page-inner">
          <Page {...sharedProps} />
        </div>
      </div>
      <BottomNav screen={screen} setScreen={setScreen} />
      {tweaks && <TweaksPanel records={records} setRecords={setRecords} setActs={setActs} setImages={setImages} settings={settings} updateSettings={updateSettings} onClose={() => setTweaks(false)} />}
      {idleAlert && <IdleModal
        idleMinutes={Math.floor((Date.now() - lastActivityRef.current) / 60000)}
        onDismiss={() => { setIdleAlert(false); lastActivityRef.current = Date.now(); }}
        onEndSession={() => { timeOut(); setIdleAlert(false); lastActivityRef.current = Date.now(); }} />}
      {timeoutAlert && <AlertBanner icon="⏰" title="Don't forget to Time Out!" sub={`It's past ${settings.timeoutTime || '18:00'} — your session is still running.`}
        actionLabel="Time Out" onAction={() => { timeOut(); setTimeoutAlert(false); dismissedRef.current.timeout = todayKey(); }}
        onDismiss={() => { setTimeoutAlert(false); dismissedRef.current.timeout = todayKey(); }} />}
      {logAlert && !timeoutAlert && !idleAlert && <AlertBanner icon="📋" title="Don't forget to log today!" sub="Tap to start your session now."
        actionLabel="Time In" onAction={() => { timeIn(); setLogAlert(false); dismissedRef.current.log = todayKey(); setScreen('home'); }}
        onDismiss={() => { setLogAlert(false); dismissedRef.current.log = todayKey(); }} />}
    </div>);

}

// ─── Contribution Chart ───────────────────────────────────────────────────────
function ContributionChart({ records, paidLunch = true }) {
  const [tip, setTip] = useState(null);

  const hoursMap = useMemo(() => {
    const m = {};
    records.forEach(r => { m[r.date] = effectiveHours(r, paidLunch); });
    return m;
  }, [records, paidLunch]);

  const { weeks, monthLabels } = useMemo(() => {
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    const start = new Date(today);
    start.setDate(start.getDate() - 16 * 7);
    start.setDate(start.getDate() - start.getDay());
    const weeksArr = [], months = [];
    let cur = new Date(start);
    while (true) {
      const wsStr = cur.toISOString().slice(0, 10);
      if (wsStr > todayStr) break;
      const week = [];
      for (let d = 0; d < 7; d++) {
        const iso = cur.toISOString().slice(0, 10);
        if (d === 0) {
          const ml = cur.toLocaleDateString('en-US', { month: 'short' });
          if (!months.length || months[months.length - 1].label !== ml)
            months.push({ label: ml, col: weeksArr.length });
        }
        week.push({ date: iso, future: iso > todayStr });
        cur.setDate(cur.getDate() + 1);
      }
      weeksArr.push(week);
    }
    return { weeks: weeksArr, monthLabels: months };
  }, []);

  const getLevel = (hrs) => !hrs ? 0 : hrs < 2 ? 1 : hrs < 4 ? 2 : hrs < 6 ? 3 : 4;
  const DAYS = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  const SZ = 13, GAP = 3;

  return (
    <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '16px', border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <h2 style={{ fontSize: 15, fontWeight: 700 }}>Attendance Heatmap</h2>
        <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
          <span style={{ fontSize: 10, color: 'var(--text3)', marginRight: 2 }}>Less</span>
          {[0, 1, 2, 3, 4].map(l => (
            <div key={l} style={{ width: SZ, height: SZ, borderRadius: 3, flexShrink: 0,
              background: l === 0 ? 'var(--border)' : `color-mix(in srgb, var(--accent) ${l * 25}%, var(--bg))` }} />
          ))}
          <span style={{ fontSize: 10, color: 'var(--text3)', marginLeft: 2 }}>More</span>
        </div>
      </div>
      <div style={{ overflowX: 'auto', paddingBottom: 2 }}>
        <div style={{ display: 'inline-flex', gap: GAP, minWidth: 'max-content' }}>
          {/* Day labels */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: GAP, paddingTop: 18, marginRight: 2 }}>
            {DAYS.map((d, i) => (
              <div key={i} style={{ width: 10, height: SZ, fontSize: 10, color: 'var(--text3)', display: 'flex', alignItems: 'center' }}>
                {i % 2 === 1 ? d : ''}
              </div>
            ))}
          </div>
          {/* Weeks grid */}
          <div>
            {/* Month labels */}
            <div style={{ display: 'flex', gap: GAP, marginBottom: 4, height: 14 }}>
              {weeks.map((_, wi) => {
                const ml = monthLabels.find(m => m.col === wi);
                return (
                  <div key={wi} style={{ width: SZ, fontSize: 10, color: 'var(--text3)', whiteSpace: 'nowrap', overflow: 'visible', flexShrink: 0 }}>
                    {ml ? ml.label : ''}
                  </div>
                );
              })}
            </div>
            {/* Cells */}
            <div style={{ display: 'flex', gap: GAP }}>
              {weeks.map((week, wi) => (
                <div key={wi} style={{ display: 'flex', flexDirection: 'column', gap: GAP }}>
                  {week.map((cell, di) => {
                    const hrs = hoursMap[cell.date] || 0;
                    const lv = cell.future ? -1 : getLevel(hrs);
                    return (
                      <div key={di}
                        style={{ width: SZ, height: SZ, borderRadius: 3, flexShrink: 0,
                          background: cell.future ? 'transparent'
                            : lv === 0 ? 'var(--border)'
                            : `color-mix(in srgb, var(--accent) ${lv * 25}%, var(--bg))`,
                          cursor: !cell.future && hrs > 0 ? 'pointer' : 'default',
                          transition: 'transform 0.1s' }}
                        onMouseEnter={e => { if (!cell.future) { const r = e.currentTarget.getBoundingClientRect(); setTip({ date: cell.date, hrs, x: r.left + SZ / 2, y: r.top }); } }}
                        onMouseLeave={() => setTip(null)}
                      />
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      {tip && (
        <div style={{ position: 'fixed', left: tip.x, top: tip.y - 38, transform: 'translateX(-50%)',
          background: 'var(--text)', color: 'white', fontSize: 12, fontWeight: 600,
          padding: '5px 10px', borderRadius: 7, pointerEvents: 'none', zIndex: 999, whiteSpace: 'nowrap' }}>
          {fmtShort(tip.date)} · {tip.hrs > 0 ? fmtH(tip.hrs) : 'No log'}
        </div>
      )}
    </div>
  );
}

          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {streak > 0 && <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--amber)' }}>🔥 {streak} day streak</span>}
            <span style={{ fontSize: 12, color: 'var(--text2)', fontWeight: 500 }}>{daysWorked}d · {fmtH(weekTotal)}</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 5 }}>
          {days.map(day => {
            const barH = day.hrs > 0 ? Math.max((day.hrs / maxHrs) * BAR_MAX, 6) : 0;
            return (
              <button key={day.key} onClick={() => day.rec && setScreen('logs')}
                style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
                  padding: '10px 3px 8px', borderRadius: 12, transition: 'all 0.15s',
                  background: day.isToday ? 'var(--accent)' : day.hrs > 0 ? 'var(--accent-light)' : 'var(--bg)',
                  opacity: day.isFuture ? 0.35 : 1,
                  cursor: day.rec ? 'pointer' : 'default' }}>
                <span style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em',
                  color: day.isToday ? 'rgba(255,255,255,0.75)' : 'var(--text3)' }}>{day.label}</span>
                <span style={{ fontSize: 15, fontWeight: 700,
                  color: day.isToday ? 'white' : day.hrs > 0 ? 'var(--accent)' : 'var(--text2)' }}>{day.d.getDate()}</span>
                <div style={{ width: '100%', height: BAR_MAX, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
                  <div style={{ width: '55%', height: barH || 3, borderRadius: 3, transition: 'height 0.5s ease',
                    background: day.isToday ? 'rgba(255,255,255,0.45)' : day.hrs > 0 ? 'var(--accent)' : 'var(--border)' }} />
                </div>
                <span style={{ fontSize: 10, fontWeight: 600, minHeight: 14,
                  color: day.isToday ? 'rgba(255,255,255,0.8)' : 'var(--text3)' }}>
                  {day.hrs > 0 ? fmtH(day.hrs) : ''}
                </span>
              </button>
            );
          })}
        </div>
      </div>
    );
  })();


  const lastWorked = useMemo(() => records.filter(r => r.date < todayKey() && getSessions(r).filter(s => s.in && s.out).length > 0).sort((a, b) => b.date.localeCompare(a.date))[0], [records]);
  const dupYesterday = () => {
    if (!lastWorked) return;
    const today = todayKey();
    const sessions = getSessions(lastWorked).filter(s => s.in && s.out).map(s => {
      const iD = new Date(s.in), oD = new Date(s.out);
      const pad = n => String(n).padStart(2,'0');
      return { id: Date.now() + Math.random(), in: `${today}T${pad(iD.getHours())}:${pad(iD.getMinutes())}:00`, out: `${today}T${pad(oD.getHours())}:${pad(oD.getMinutes())}:00` };
    });
    addRecord({ date: today, id: Date.now(), manual: true, sessions });
  };
  const noTodaySession = !todayRec || getSessions(todayRec).length === 0;

  const EstCard = (() => {
    if (remaining <= 0) return null;
    const workedRecs = records.filter(r => effectiveHours(r, settings.paidLunch) > 0);
    if (workedRecs.length < 2) return null;
    const avg = workedRecs.reduce((s, r) => s + effectiveHours(r, settings.paidLunch), 0) / workedRecs.length;
    const daysNeeded = Math.ceil(remaining / avg);
    const est = new Date(); let added = 0;
    while (added < daysNeeded) { est.setDate(est.getDate() + 1); if (est.getDay() !== 0 && est.getDay() !== 6) added++; }
    const estStr = est.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    return (
      <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '16px', border: '1px solid var(--border)' }}>
        <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Estimated Completion</p>
        <p style={{ fontSize: 21, fontWeight: 700, color: 'var(--accent)' }}>{estStr}</p>
        <p style={{ fontSize: 12, color: 'var(--text2)', marginTop: 4 }}>{daysNeeded} work day{daysNeeded !== 1 ? 's' : ''} · ~{avg.toFixed(1)} hrs/day avg · {fmtH(remaining)} left</p>
      </div>
    );
  })();

  return (
    <div style={{ paddingBottom: 12 }} className="fade-in">
      {/* Header */}
      <div style={{ padding: '28px 20px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <p style={{ fontSize: 13, color: 'var(--text2)', fontWeight: 500 }}>{now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</p>
          <h1 style={{ fontSize: desktop ? 28 : 23, fontWeight: 700, marginTop: 2 }}>{greet()}{settings.name ? `, ${settings.name.split(' ')[0]}` : ''} 👋</h1>
          <p style={{ fontSize: 13, color: 'var(--text2)', marginTop: 1 }}>{settings.company || 'TICKR'}</p>
        </div>
        {!desktop && <button onClick={() => setScreen('settings')} style={{ width: 40, height: 40, borderRadius: '50%', background: 'var(--accent-light)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="user" size={18} color="var(--accent)" />
        </button>}
      </div>

      {desktop ?
      <div style={{ padding: '18px 20px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          {/* Row 1: Hero (left) + Week (right) — equal height */}
          <div style={{ display: 'grid', gridTemplateColumns: '5fr 4fr', gap: 16, alignItems: 'stretch' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {HeroCard}
              {noTodaySession && lastWorked && (
                <button onClick={dupYesterday} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '11px 16px', borderRadius: 12, background: 'var(--surface)', border: '1.5px dashed var(--accent)', color: 'var(--accent)', fontWeight: 600, fontSize: 13, width: '100%' }}>
                  <Icon name="copy" size={15} color="var(--accent)" />
                  Copy {new Date(lastWorked.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}'s schedule
                </button>
              )}
            </div>
            <div style={{ height: '100%' }}>
              {WeekCard}
            </div>
          </div>
          {/* Row 2: Summary stats (3-col) + Est completion */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr auto', gap: 14, alignItems: 'stretch' }}>
            {[
              { label: 'Rendered', value: fmtH(totalHours), bg: 'var(--accent-light)', c: 'var(--accent)' },
              { label: 'Required', value: fmtH(settings.requiredHours), bg: 'var(--emerald-light)', c: 'var(--emerald)' },
              { label: 'Remaining', value: fmtH(remaining), bg: 'var(--amber-light)', c: 'var(--amber)' },
            ].map(x => (
              <div key={x.label} style={{ background: x.bg, borderRadius: 'var(--r)', padding: '16px 14px', textAlign: 'center' }}>
                <p style={{ fontSize: 22, fontWeight: 700, color: x.c }}>{x.value}</p>
                <p style={{ fontSize: 11, color: 'var(--text2)', fontWeight: 500, marginTop: 3 }}>{x.label}</p>
              </div>
            ))}
            {EstCard
              ? <div style={{ minWidth: 200 }}>{EstCard}</div>
              : <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '16px 14px', border: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', minWidth: 160 }}>
                  <p style={{ fontSize: 12, color: 'var(--text3)', textAlign: 'center' }}>Log more days to see ETA</p>
                </div>
            }
          </div>
          {/* Row 3: Contribution chart full width */}
          <ContributionChart records={records} paidLunch={settings.paidLunch} />
        </div> :

      <>
          <div style={{ margin: '18px 20px 0' }}>{HeroCard}</div>
          {noTodaySession && lastWorked && (
            <div style={{ margin: '12px 20px 0' }}>
              <button onClick={dupYesterday} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '11px 16px', borderRadius: 12, background: 'var(--surface)', border: '1.5px dashed var(--accent)', color: 'var(--accent)', fontWeight: 600, fontSize: 13, width: '100%' }}>
                <Icon name="copy" size={15} color="var(--accent)" />
                Copy {new Date(lastWorked.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}'s schedule
              </button>
            </div>
          )}
          <div style={{ margin: '16px 20px 0' }}>{SummaryCards}</div>
          <div style={{ margin: '16px 20px 0' }}>{WeekCard}</div>
          {EstCard && <div style={{ margin: '16px 20px 0' }}>{EstCard}</div>}
          <div style={{ margin: '16px 20px 24px' }}><ContributionChart records={records} paidLunch={settings.paidLunch} /></div>
        </>
      }
    </div>);

}

// ─── Swipeable Row (mobile swipe-to-delete) ───────────────────────────────────
function SwipeableRow({ onDelete, children }) {
  const [offset, setOffset] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const startX = useRef(0);
  const ACTION_W = 72;

  const onTouchStart = (e) => { startX.current = e.touches[0].clientX; setSwiping(true); };
  const onTouchMove = (e) => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - startX.current;
    if (dx < 0) setOffset(Math.max(dx, -ACTION_W));
    else if (offset < 0) setOffset(Math.min(dx + offset, 0));
  };
  const onTouchEnd = () => {
    setSwiping(false);
    setOffset(offset < -(ACTION_W / 2) ? -ACTION_W : 0);
  };

  return (
    <div style={{ position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', right: 0, top: 0, bottom: 0, width: ACTION_W, display: 'flex' }}>
        <button onClick={() => { onDelete(); setOffset(0); }}
          style={{ flex: 1, background: 'var(--rose)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="trash" size={17} color="white" />
        </button>
      </div>
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{ transform: `translateX(${offset}px)`, transition: swiping ? 'none' : 'transform 0.25s cubic-bezier(0.4,0,0.2,1)', background: 'var(--surface)', position: 'relative', zIndex: 1 }}>
        {children}
      </div>
    </div>
  );
}

function Logs({ records, deleteRecord, addRecord, addSession, deleteSession, editSession, images, addImage, removeImage, activities, updateAct, settings, desktop }) {
  const [showAdd, setShowAdd] = useState(false);
  const [selected, setSelected] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const nowD = new Date();
  const [viewYear, setViewYear] = useState(nowD.getFullYear());
  const [viewMonth, setViewMonth] = useState(nowD.getMonth());

  const today = todayKey();
  const selectedRecord = selected ? records.find(r => r.date === selected) : null;

  const recMap = useMemo(() => {
    const m = {};
    records.forEach(r => { m[r.date] = r; });
    return m;
  }, [records]);

  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [...Array(firstDow).fill(null), ...Array.from({length: daysInMonth}, (_, i) => i + 1)];
  const monthPrefix = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}`;

  const canPrev = viewYear > 2020 || viewMonth > 0;
  const canNext = new Date(viewYear, viewMonth + 1, 1) <= new Date(today);
  const isCurMonth = viewYear === nowD.getFullYear() && viewMonth === nowD.getMonth();

  const prevMonth = () => { if (viewMonth === 0) { setViewYear(y => y - 1); setViewMonth(11); } else setViewMonth(m => m - 1); };
  const nextMonth = () => { if (!canNext) return; if (viewMonth === 11) { setViewYear(y => y + 1); setViewMonth(0); } else setViewMonth(m => m + 1); };
  const goToday = () => { setViewYear(nowD.getFullYear()); setViewMonth(nowD.getMonth()); };

  const monthStats = useMemo(() => {
    let total = 0, worked = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const r = recMap[`${monthPrefix}-${String(d).padStart(2, '0')}`];
      if (r) { const h = effectiveHours(r, settings.paidLunch); total += h; if (h > 0) worked++; }
    }
    return { total, worked };
  }, [monthPrefix, daysInMonth, recMap, settings.paidLunch]);

  const getStatus = (r) => {
    if (!r) return null;
    if (r.manual) return 'manual';
    const sessions = getSessions(r);
    if (sessions.length === 0) return 'absent';
    if (openSession(r)) return 'pending';
    return 'complete';
  };

  const SC = {
    complete: { bg: 'var(--emerald-light)', c: 'var(--emerald)', bd: 'var(--emerald)' },
    pending:  { bg: 'var(--amber-light)',   c: 'var(--amber)',   bd: 'var(--amber)' },
    absent:   { bg: 'var(--rose-light)',    c: 'var(--rose)',    bd: 'var(--rose)' },
    manual:   { bg: '#ede9fe',              c: '#7c3aed',        bd: '#7c3aed' },
  };

  const monthLabel = new Date(viewYear, viewMonth, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const calGrid = (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 4 }}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
          <div key={d} style={{ textAlign: 'center', fontSize: 10, fontWeight: 700, color: 'var(--text3)', padding: '3px 0', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{d}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={`e${i}`} />;
          const key = `${monthPrefix}-${String(day).padStart(2, '0')}`;
          const r = recMap[key];
          const isToday = key === today;
          const isFuture = key > today;
          const isSel = key === selected;
          const status = getStatus(r);
          const hrs = r ? effectiveHours(r, settings.paidLunch) : 0;

// ─── Edit Session Modal ───────────────────────────────────────────────────────
function EditSessionModal({ session, date, onClose, onSave }) {
  const toTimeStr = iso => { if (!iso) return ''; const d = new Date(iso); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
  const [tIn, setTIn] = useState(toTimeStr(session.in));
  const [tOut, setTOut] = useState(toTimeStr(session.out));
  const [err, setErr] = useState('');
  const save = () => {
    if (!tIn) { setErr('Time In is required.'); return; }
    if (tOut && tOut <= tIn) { setErr('Time Out must be after Time In.'); return; }
    onSave(parseTimeToISO(date, tIn), tOut ? parseTimeToISO(date, tOut) : null);
  };
  return (
    <Modal title="Edit Session" onClose={onClose}>
      <Field label="Time In"><input type="time" value={tIn} onChange={e => setTIn(e.target.value)} style={inputStyle} /></Field>
      <Field label="Time Out (optional)"><input type="time" value={tOut} onChange={e => setTOut(e.target.value)} style={inputStyle} /></Field>
      {err && <p style={{ fontSize: 13, color: 'var(--rose)', marginBottom: 12, padding: '8px 12px', background: 'var(--rose-light)', borderRadius: 8 }}>{err}</p>}
      <button onClick={save} style={{ width: '100%', padding: 14, borderRadius: 10, background: 'var(--accent)', color: 'white', fontWeight: 700, fontSize: 15 }}>Save Changes</button>
    </Modal>
  );
}

// ─── Mini Calendar Picker ────────────────────────────────────────────────────
function MiniCalendar({ value, onChange, maxDate, existingDates }) {
  const initD = value ? new Date(value + 'T00:00:00') : new Date(maxDate + 'T00:00:00');
  const [vy, setVy] = useState(initD.getFullYear());
  const [vm, setVm] = useState(initD.getMonth());

  const firstDow = new Date(vy, vm, 1).getDay();
  const daysInMonth = new Date(vy, vm + 1, 0).getDate();
  const cells = [...Array(firstDow).fill(null), ...Array.from({length: daysInMonth}, (_, i) => i + 1)];

  const canPrev = new Date(vy, vm - 1, 1) >= new Date(2020, 0, 1);
  const canNext = new Date(vy, vm + 1, 1) <= new Date(maxDate + 'T00:00:00');
  const prev = () => { if (vm === 0) { setVm(11); setVy(vy - 1); } else setVm(vm - 1); };
  const next = () => { if (vm === 11) { setVm(0); setVy(vy + 1); } else setVm(vm + 1); };

  const monthLabel = new Date(vy, vm, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  return (
    <div style={{ background: 'var(--bg)', borderRadius: 12, padding: '12px 8px', border: '1.5px solid var(--border)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, padding: '0 4px' }}>
        <button onClick={prev} disabled={!canPrev} style={{ width: 30, height: 30, borderRadius: 8, background: canPrev ? 'var(--surface)' : 'transparent', color: canPrev ? 'var(--text)' : 'var(--border)', fontWeight: 700, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>‹</button>
        <span style={{ fontSize: 14, fontWeight: 700 }}>{monthLabel}</span>
        <button onClick={next} disabled={!canNext} style={{ width: 30, height: 30, borderRadius: 8, background: canNext ? 'var(--surface)' : 'transparent', color: canNext ? 'var(--text)' : 'var(--border)', fontWeight: 700, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>›</button>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (
          <div key={d} style={{ textAlign: 'center', fontSize: 10, fontWeight: 700, color: 'var(--text3)', padding: '3px 0' }}>{d}</div>
        ))}
        {cells.map((day, i) => {
          if (!day) return <div key={`e${i}`} />;
          const key = `${vy}-${String(vm + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isDisabled = key > maxDate;
          const isSelected = key === value;
          const hasRecord = existingDates.has(key);
          const col = i % 7;
          const isWeekend = col === 0 || col === 6;
          return (
            <button key={key} disabled={isDisabled} onClick={() => onChange(key)}
              style={{ position: 'relative', padding: '7px 0', borderRadius: 8, textAlign: 'center',
                background: isSelected ? 'var(--accent)' : 'transparent',
                color: isSelected ? 'white' : isDisabled ? 'var(--border)' : isWeekend ? 'var(--text2)' : 'var(--text)',
                fontWeight: isSelected ? 700 : 500, fontSize: 13,
                cursor: isDisabled ? 'default' : 'pointer' }}>
              {day}
              {hasRecord && !isSelected && (
                <span style={{ position: 'absolute', bottom: 2, left: '50%', transform: 'translateX(-50%)', width: 4, height: 4, borderRadius: '50%', background: 'var(--amber)', display: 'block' }} />
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Add Record Modal ─────────────────────────────────────────────────────────
function AddRecordModal({ onClose, onSave, existingDates }) {
  const [date, setDate] = useState('');
  const [tIn, setTIn] = useState('08:00');
  const [tOut, setTOut] = useState('17:00');
  const [err, setErr] = useState('');

  const save = () => {
    if (!date) {setErr('Please select a date.');return;}
    if (date === todayKey()) {setErr("Use the Time In/Out buttons for today's record.");return;}
    if (date > todayKey()) {setErr('Cannot add future dates.');return;}
    if (!tIn) {setErr('Please enter a Time In.');return;}
    if (tOut && tOut <= tIn) {setErr('Time Out must be after Time In.');return;}
    const sIn = parseTimeToISO(date, tIn);
    const sOut = tOut ? parseTimeToISO(date, tOut) : null;
    onSave({ date, id: Date.now(), manual: true, sessions: [{id: Date.now()+'_0', in: sIn, out: sOut}] });
  };

  const maxDate = new Date(); maxDate.setDate(maxDate.getDate() - 1);
  const maxStr = maxDate.toISOString().slice(0, 10);

  return (
    <Modal title="Add Past Record" onClose={onClose}>
      <Field label="Select Date">
        <MiniCalendar value={date} onChange={setDate} maxDate={maxStr} existingDates={existingDates} />
        {date && <p style={{ fontSize: 12, color: 'var(--text2)', marginTop: 6, textAlign: 'center', fontWeight: 600 }}>
          {new Date(date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
        </p>}
        {existingDates.has(date) && <p style={{ fontSize: 12, color: 'var(--amber)', marginTop: 4 }}>⚠ A record for this date already exists — saving will update it.</p>}
      </Field>
      <Field label="Time In">
        <input type="time" value={tIn} onChange={(e) => setTIn(e.target.value)} style={inputStyle} />
      </Field>
      <Field label="Time Out (optional)">
        <input type="time" value={tOut} onChange={(e) => setTOut(e.target.value)} style={inputStyle} />
      </Field>
      {err && <p style={{ fontSize: 13, color: 'var(--rose)', marginBottom: 12, padding: '8px 12px', background: 'var(--rose-light)', borderRadius: 8 }}>{err}</p>}
      <button onClick={save} disabled={!date} style={{ width: '100%', padding: 14, borderRadius: 10, background: date ? 'var(--accent)' : 'var(--border)', color: date ? 'white' : 'var(--text3)', fontWeight: 700, fontSize: 15, cursor: date ? 'pointer' : 'not-allowed' }}>Save Record</button>
    </Modal>);

}

// ─── Add Session Modal ────────────────────────────────────────────────────────
function AddSessionModal({date, onClose, onSave, existingSessions}) {
  const [tIn, setTIn] = useState('08:00');
  const [tOut, setTOut] = useState('17:00');
  const [err, setErr] = useState('');

  const save = () => {
    if (!tIn) { setErr('Please enter a Time In.'); return; }
    if (tOut && tOut <= tIn) { setErr('Time Out must be after Time In.'); return; }
    // Check overlap with existing sessions
    const newIn = parseTimeToISO(date, tIn);
    const newOut = tOut ? parseTimeToISO(date, tOut) : null;
    for (const s of existingSessions) {
      const sIn = new Date(s.in), sOut = s.out ? new Date(s.out) : null;
      const nIn = new Date(newIn), nOut = newOut ? new Date(newOut) : null;
      if (sOut && nOut) {
        if (nIn < sOut && nOut > sIn) { setErr('This session overlaps with an existing one.'); return; }
      }
    }
    onSave(newIn, newOut);
  };

  return (
    <Modal title={`Add Session — ${fmtDate(date)}`} onClose={onClose}>
      <p style={{fontSize:13,color:'var(--text2)',marginBottom:16,padding:'8px 12px',background:'var(--accent-light)',borderRadius:8}}>
        Add an additional time-in/out session for this day. Sessions are tracked separately.
      </p>
      <Field label="Time In">
        <input type="time" value={tIn} onChange={e=>setTIn(e.target.value)} style={inputStyle}/>
      </Field>
      <Field label="Time Out (optional)">
        <input type="time" value={tOut} onChange={e=>setTOut(e.target.value)} style={inputStyle}/>
      </Field>
      {err && <p style={{fontSize:13,color:'var(--rose)',marginBottom:12,padding:'8px 12px',background:'var(--rose-light)',borderRadius:8}}>{err}</p>}
      <button onClick={save} style={{width:'100%',padding:14,borderRadius:10,background:'var(--accent)',color:'white',fontWeight:700,fontSize:15}}>
        Add Session
      </button>
    </Modal>
  );
}

function Charts({ records, totalHours, settings, desktop, activities, addRecord, updateAct }) {
  const [view, setView] = useState('daily');

  const sorted = [...records].filter((r) => effectiveHours(r, settings.paidLunch) > 0).sort((a, b) => a.date.localeCompare(b.date));

  // Last 14 days bar data
  const barData = useMemo(() => {
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date();d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const rec = records.find((r) => r.date === key);
      days.push({ key, label: fmtDayShort(key), date: fmtShort(key), hours: rec ? effectiveHours(rec, settings.paidLunch) : 0 });
    }
    return days;
  }, [records]);

  // Cumulative line data
  const lineData = useMemo(() => {
    let cum = 0;
    return sorted.map((r) => {cum += effectiveHours(r, settings.paidLunch);return { date: fmtShort(r.date), cum, daily: effectiveHours(r, settings.paidLunch) };});
  }, [sorted]);

  // Weekly totals
  const weekData = useMemo(() => {
    const weeks = {};
    sorted.forEach((r) => {
      const d = new Date(r.date + 'T00:00:00');
      const sun = new Date(d);sun.setDate(d.getDate() - d.getDay());
      const key = sun.toISOString().slice(0, 10);
      weeks[key] = (weeks[key] || 0) + effectiveHours(r, settings.paidLunch);
    });
    return Object.entries(weeks).sort((a, b) => a[0].localeCompare(b[0])).slice(-8).map(([k, v]) => ({ label: `Wk ${fmtShort(k)}`, hours: v }));
  }, [sorted]);

  const pct = Math.min(totalHours / settings.requiredHours * 100, 100);
  const avgHours = sorted.length > 0 ? totalHours / sorted.length : 0;
  const daysLeft = sorted.length > 0 ? Math.ceil(Math.max(settings.requiredHours - totalHours, 0) / avgHours) : 0;
  const thisWeekSummary = useMemo(() => {
    const now = new Date(); const dow = now.getDay();
    const monday = new Date(now); monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
    const days = Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d.toISOString().slice(0,10); });
    const worked = days.map(k => { const r = records.find(r=>r.date===k); const h=r?effectiveHours(r,settings.paidLunch):0; return {date:k,hrs:h,rec:r}; });
    const total = worked.reduce((s,d)=>s+d.hrs,0);
    const workedDays = worked.filter(d=>d.hrs>0).length;
    return { days: worked, total, workedDays, avg: workedDays>0?total/workedDays:0 };
  }, [records, settings.paidLunch]);

  return (
    <div style={{ paddingBottom: 12 }} className="fade-in">
      <div style={{ padding: '28px 20px 16px' }}>
        <h1 style={{ fontSize: 22, fontWeight: 700 }}>Report</h1>
        <p style={{ fontSize: 13, color: 'var(--text2)', marginTop: 2 }}>Your OJT hours at a glance</p>
      </div>

      {/* Stats row */}
      <div style={{ display: 'grid', gridTemplateColumns: desktop ? 'repeat(5,1fr)' : '1fr 1fr', gap: 10, padding: '0 20px 16px' }}>
        {[
        { label: 'Days Logged', value: sorted.length, sub: 'days with hours' },
        { label: 'Avg per Day', value: fmtH(avgHours), sub: 'average daily' },
        { label: 'Est. Days Left', value: daysLeft || '—', sub: daysLeft ? 'at current pace' : 'start logging' },
        { label: 'Completion', value: `${pct.toFixed(1)}%`, sub: `of ${settings.requiredHours}h required` }].
        map((s) =>
        <div key={s.label} style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '14px 16px', border: '1px solid var(--border)' }}>
            <p style={{ fontSize: 11, color: 'var(--text3)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{s.label}</p>

      {/* Data Portability */}

        const downloadCSV = () => {
          const rows = [['Date','Day','Session #','Time In','Time Out','Session Hours','Total Day Hours','Status','Notes']];

            const sessions=getSessions(r), totalH=effectiveHours(r, settings.paidLunch);
            const status=sessions.length===0?'Absent':openSession(r)?'Active':'Complete';
            if(sessions.length===0){
              rows.push([fmtDate(r.date),fmtDay(r.date),'—','—','—','0',totalH.toFixed(2),status,(activities[r.date]||'').replace(/\n/g,' | ')]);
            } else {
              sessions.forEach((s,i)=>{
                const sH=s.in&&s.out?msToHours(new Date(s.out)-new Date(s.in)):0;
                rows.push([fmtDate(r.date),fmtDay(r.date),i+1,fmt12(s.in),s.out?fmt12(s.out):'Active',sH.toFixed(2),i===0?totalH.toFixed(2):'',i===0?status:'',i===0?(activities[r.date]||'').replace(/\n/g,' | '):'']);
              });
            }
          });
          rows.push(['','','','','TOTAL','',records.reduce((s,r)=>s+effectiveHours(r, settings.paidLunch),0).toFixed(2),'','']);
          const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
          const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=`OJT_DTR_${todayKey()}.csv`; a.click();
        };
        const downloadTemplate = () => {
          const csv=['Date,Time In,Time Out,Notes','2026-04-19,08:00,17:00,First day at office','2026-04-20,08:30,17:30,','2026-04-21,09:00,18:00,Attended orientation'].join('\n');
          const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='OJT_DTR_Template.csv'; a.click();
        };
        const importCSV = (e) => {
          const file=e.target.files[0]; if(!file) return;
          const reader=new FileReader();
          reader.onload=(ev)=>{
            const lines=ev.target.result.split(/\r?\n/).filter(l=>l.trim());
            const header=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
            const col=(row,names)=>{const i=names.map(n=>header.indexOf(n)).find(i=>i>=0);return i>=0?row[i]:'';};
            const parseCell=c=>c.replace(/^"|"$/g,'').trim();
            const toISO=(dateStr,timeStr)=>{
              if(!dateStr||!timeStr||timeStr==='—'||timeStr==='Active') return null;
              const d=dateStr.replace(/\//g,'-');
              const t12=timeStr.match(/(\d+):(\d+)\s*(am|pm)/i);
              if(t12){let h=parseInt(t12[1]),m=parseInt(t12[2]);if(t12[3].toLowerCase()==='pm'&&h!==12)h+=12;if(t12[3].toLowerCase()==='am'&&h===12)h=0;return `${d}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`;}
              const t24=timeStr.match(/(\d{1,2}):(\d{2})/);
              if(t24) return `${d}T${String(t24[1]).padStart(2,'0')}:${t24[2]}:00`;
              return null;
            };
            const byDate={};
            for(let i=1;i<lines.length;i++){
              const row=lines[i].split(',').map(parseCell);
              const dateRaw=col(row,['date']); if(!dateRaw||dateRaw===''||dateRaw==='TOTAL') continue;
              const dateKey=dateRaw.replace(/\//g,'-').slice(0,10); if(!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) continue;
              if(!byDate[dateKey]) byDate[dateKey]={date:dateKey,sessions:[],note:''};
              const inISO=toISO(dateKey,col(row,['time in','timein'])), outISO=toISO(dateKey,col(row,['time out','timeout']));
              if(inISO) byDate[dateKey].sessions.push({id:Date.now()+'_'+i,in:inISO,out:outISO||null});
              const note=col(row,['notes','note']); if(note) byDate[dateKey].note=note;
            }
            const toImport=Object.values(byDate);
            if(!toImport.length){alert('No valid records found in CSV.');return;}
            toImport.forEach(r=>{addRecord({date:r.date,id:Date.now(),manual:true,sessions:r.sessions});if(r.note)updateAct(r.date,r.note);});
            alert(`Imported ${toImport.length} record(s) successfully.`);
          };
          reader.readAsText(file); e.target.value='';
        };
        return (
          <div style={{ margin: '14px 20px 0', background: 'var(--surface)', borderRadius: 'var(--r)', padding: '18px', border: '1px solid var(--border)' }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>Data Portability</p>
            <button onClick={downloadCSV} disabled={records.length === 0}
              style={{ width: '100%', padding: 13, borderRadius: 10, background: records.length === 0 ? 'var(--border)' : 'var(--accent-light)', color: records.length === 0 ? 'var(--text3)' : 'var(--accent)', fontWeight: 600, fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: records.length === 0 ? 'not-allowed' : 'pointer', marginBottom: 10 }}>
              <Icon name="csv" size={17} color={records.length === 0 ? 'var(--text3)' : 'var(--accent)'} />
              Download CSV ({records.length} records)
            </button>
            <label style={{ width: '100%', padding: 13, borderRadius: 10, background: 'var(--accent-light)', color: 'var(--accent)', fontWeight: 600, fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer', marginBottom: 10, boxSizing: 'border-box' }}>
              <svg width={17} height={17} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Import CSV
              <input type="file" accept=".csv,text/csv" onChange={importCSV} style={{ display: 'none' }} />
            </label>
            <button onClick={downloadTemplate}
              style={{ width: '100%', padding: 13, borderRadius: 10, background: 'var(--emerald-light)', color: 'var(--emerald)', fontWeight: 600, fontSize: 14, border: '1.5px solid var(--emerald)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer' }}>
              <svg width={17} height={17} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/>
              </svg>
              Download Data Entry Template
            </button>
            <p style={{ fontSize: 12, color: 'var(--text3)', marginTop: 8, textAlign: 'center' }}>Use the template to fill in your records, then import it here.</p>
          </div>
        );
      })()}

    </div>);

}

function BarChart({ data, yKey, labelKey, title }) {
  const W = 340,H = 160,PAD = { t: 10, r: 10, b: 34, l: 34 };
  const maxVal = Math.max(...data.map((d) => d[yKey]), 1);
  const cW = W - PAD.l - PAD.r,cH = H - PAD.t - PAD.b;
  const bW = Math.max(cW / data.length - 4, 4);
  const yTicks = [0, Math.ceil(maxVal / 2), Math.ceil(maxVal)];
  return (
    <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '16px', border: '1px solid var(--border)', marginBottom: 10 }}>
      <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', marginBottom: 12 }}>{title}</p>
      <div style={{ overflowX: 'auto' }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ minWidth: 280, display: 'block' }}>
          {/* Grid lines */}
          {yTicks.map((t) => {
            const y = PAD.t + cH - t / maxVal * cH;
            return <g key={t}>
              <line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke="var(--border)" strokeWidth="1" />
              <text x={PAD.l - 4} y={y + 4} fontSize="9" fill="var(--text3)" textAnchor="end">{t}h</text>
            </g>;
          })}
          {/* Bars */}
          {data.map((d, i) => {
            const h = Math.max(d[yKey] / maxVal * cH, d[yKey] > 0 ? 2 : 0);
            const x = PAD.l + cW / data.length * i + (cW / data.length - bW) / 2;
            const y = PAD.t + cH - h;
            const isToday = d.key === todayKey();
            return <g key={i}>
              <rect x={x} y={y} width={bW} height={h} rx={Math.min(bW / 2, 4)}
              fill={isToday ? 'var(--accent)' : d[yKey] > 0 ? 'var(--accent-mid)' : 'var(--border)'}
              opacity={d[yKey] > 0 ? 1 : 0.5} />
              {data.length <= 14 && <text x={x + bW / 2} y={H - 2} fontSize="8" fill={isToday ? 'var(--accent)' : 'var(--text3)'} textAnchor="middle" fontWeight={isToday ? '700' : '400'}>{d[labelKey]}</text>}
            </g>;
          })}
        </svg>
      </div>
    </div>);

}

function LineChart({ data, required, title }) {
  const W = 340,H = 170,PAD = { t: 14, r: 16, b: 30, l: 40 };
  const maxVal = Math.max(Math.max(...data.map((d) => d.cum)), required) * 1.05;
  const cW = W - PAD.l - PAD.r,cH = H - PAD.t - PAD.b;
  const px = (i) => PAD.l + i / (data.length - 1) * cW;
  const py = (v) => PAD.t + cH - v / maxVal * cH;
  const pts = data.map((d, i) => `${px(i)},${py(d.cum)}`).join(' ');
  const areaPath = `M${px(0)},${py(0)} ${data.map((d, i) => `L${px(i)},${py(d.cum)}`).join(' ')} L${px(data.length - 1)},${PAD.t + cH} L${px(0)},${PAD.t + cH} Z`;
  const reqY = py(required);
  const yTicks = [0, Math.ceil(required / 2), required];
  return (
    <div style={{ background: 'var(--surface)', borderRadius: 'var(--r)', padding: '16px', border: '1px solid var(--border)', marginBottom: 10 }}>
      <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', marginBottom: 12 }}>{title}</p>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block' }}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.2" />
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
          </linearGradient>
        </defs>
        {yTicks.map((t) => {
          const y = py(t);
          return <g key={t}>
            <line x1={PAD.l} y1={y} x2={W - PAD.r} y2={y} stroke="var(--border)" strokeWidth="1" />
            <text x={PAD.l - 4} y={y + 4} fontSize="9" fill="var(--text3)" textAnchor="end">{t}h</text>
          </g>;
        })}
        {reqY >= PAD.t && reqY <= PAD.t + cH &&
        <g>
            <line x1={PAD.l} y1={reqY} x2={W - PAD.r} y2={reqY} stroke="var(--emerald)" strokeWidth="1.5" strokeDasharray="4 3" />
            <text x={W - PAD.r} y={reqY - 3} fontSize="9" fill="var(--emerald)" textAnchor="end" fontWeight="600">Goal</text>
          </g>
        }
        <path d={areaPath} fill="url(#areaGrad)" />
        <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {data.map((d, i) =>
        <circle key={i} cx={px(i)} cy={py(d.cum)} r={i === data.length - 1 ? 4 : 2.5} fill="var(--accent)" stroke="white" strokeWidth="1.5" />
        )}
        {/* X labels — show first, middle, last */}
        {[0, Math.floor((data.length - 1) / 2), data.length - 1].filter((v, i, a) => a.indexOf(v) === i).map((i) =>
        <text key={i} x={px(i)} y={H - 2} fontSize="9" fill="var(--text3)" textAnchor="middle">{data[i].date}</text>
        )}
      </svg>
    </div>);

}
